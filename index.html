<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Penyesuaian Gaji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-slide-up {
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        /* Custom Scrollbar for dropdowns if needed */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-gray-800 to-slate-900 flex items-center justify-center min-h-screen p-4 font-sans selection:bg-emerald-500/30 text-slate-200">

    <!-- Card Container -->
    <div class="relative bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl shadow-emerald-900/20 w-full max-w-md p-6 sm:p-8 border border-slate-700/50">
        
        <!-- Decoration Glow -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-emerald-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 pointer-events-none"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-cyan-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 pointer-events-none"></div>

        <h2 class="relative text-2xl font-extrabold text-center mb-6 pb-4 border-b border-slate-700/80 tracking-wide">
            <i class="fas fa-wallet text-emerald-400 mr-2"></i>
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400">
                Simulasi Gaji LSI 2026
            </span>
        </h2>
        
        <div class="space-y-4 relative z-10">
            <!-- Gaji Saat Ini -->
            <div>
                <label for="gajiSekarang" class="block text-sm font-medium text-slate-300 mb-1.5">Gaji Saat Ini (Rp)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 font-bold">
                        Rp
                    </div>
                    <input type="text" id="gajiSekarang" placeholder="Contoh: 5000000" oninput="formatRupiahInput(this)"
                           class="w-full pl-12 pr-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition-all text-white font-medium placeholder-slate-500 shadow-inner">
                </div>
            </div>

            <!-- Masa Kerja -->
            <div>
                <label for="masaKerja" class="block text-sm font-medium text-slate-300 mb-1.5">Masa Kerja (Tahun)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-hourglass-half text-slate-500"></i>
                    </div>
                    <input type="number" id="masaKerja" value="10" min="1" max="50" 
                           class="w-full pl-11 pr-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition-all text-white font-medium placeholder-slate-500 shadow-inner">
                </div>
                <p class="text-[10px] text-slate-500 mt-1 ml-1">*Senioritas hanya dihitung untuk Level 1-2 yang gajinya di bawah UMP.</p>
            </div>

            <!-- Level Jabatan -->
            <div>
                <label for="level" class="block text-sm font-medium text-slate-300 mb-1.5">Level Jabatan</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-id-badge text-slate-500"></i>
                    </div>
                    <select id="level" class="w-full pl-11 pr-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition-all appearance-none text-white font-medium shadow-inner">
                        <option value="12" class="bg-slate-800 text-white">Level 1 - 2</option>
                        <option value="3" class="bg-slate-800 text-white">Level 3</option>
                        <option value="4" class="bg-slate-800 text-white">Level 4</option>
                        <option value="58" class="bg-slate-800 text-white">Level 5 - 8</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none">
                        <i class="fas fa-chevron-down text-slate-400 text-xs"></i>
                    </div>
                </div>
            </div>

            <!-- Nilai Kinerja (PA) -->
            <div>
                <label for="pa" class="block text-sm font-medium text-slate-300 mb-1.5">Nilai Kinerja (PA)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-chart-pie text-slate-500"></i>
                    </div>
                    <select id="pa" class="w-full pl-11 pr-4 py-3 bg-slate-900/50 border border-slate-600 rounded-xl focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition-all appearance-none text-white font-medium shadow-inner">
                        <option value="A" class="bg-slate-800 text-white">A (Sangat Baik)</option>
                        <option value="BC" selected class="bg-slate-800 text-white">B / C (Baik / Cukup)</option>
                        <option value="D" class="bg-slate-800 text-white">D (Kurang)</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none">
                        <i class="fas fa-chevron-down text-slate-400 text-xs"></i>
                    </div>
                </div>
            </div>

            <!-- Button -->
            <button onclick="hitungGaji()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 active:scale-[0.98] text-white font-bold py-3.5 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.3)] hover:shadow-[0_0_25px_rgba(16,185,129,0.5)] transition-all duration-300 ease-in-out mt-4 border border-emerald-400/20">
                Kalkulasi Gaji
            </button>
        </div>

        <!-- Result Box (Menjadi lebih dinamis) -->
        <div id="resultBox" class="hidden mt-6 bg-slate-900/60 border border-slate-700/60 rounded-2xl p-5 shadow-inner relative overflow-hidden">
            <!-- Decorative line -->
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-emerald-400 to-cyan-500"></div>
            
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 ml-2">Ringkasan Estimasi</h3>
            
            <div id="rincianKalkulasi" class="space-y-3.5 text-sm text-slate-300 ml-2">
                <!-- Rincian akan di-inject lewat JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // Nilai default UMP Jakarta 2026
        const UMP = 5729876;

        function formatRupiah(angka) {
            return "Rp " + Math.round(angka).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // Fungsi untuk memformat input Gaji Saat Ini secara otomatis (Ribuan)
        function formatRupiahInput(input) {
            let angka = input.value.replace(/[^,\d]/g, '').toString();
            let split = angka.split(',');
            let sisa = split[0].length % 3;
            let rupiah = split[0].substr(0, sisa);
            let ribuan = split[0].substr(sisa).match(/\d{3}/gi);

            if (ribuan) {
                let separator = sisa ? '.' : '';
                rupiah += separator + ribuan.join('.');
            }

            rupiah = split[1] != undefined ? rupiah + ',' + split[1] : rupiah;
            input.value = rupiah;
        }

        function getNilaiAngka(stringInput) {
            if(!stringInput) return 0;
            return parseInt(stringInput.replace(/[^0-9]/g, '')) || 0;
        }

        function hitungGaji() {
            // Ambil Input
            let gajiSekarangInput = document.getElementById('gajiSekarang').value;
            let gajiSekarang = getNilaiAngka(gajiSekarangInput);
            
            let masaKerjaInput = document.getElementById('masaKerja');
            let masaKerja = parseInt(masaKerjaInput.value);
            if(isNaN(masaKerja) || masaKerja < 1) { masaKerja = 1; masaKerjaInput.value = 1; }
            
            let level = document.getElementById('level').value;
            let pa = document.getElementById('pa').value;

            const rincianDiv = document.getElementById('rincianKalkulasi');
            rincianDiv.innerHTML = ''; // Clear previous results

            // --- JIKA LEVEL 5-8 ---
            if (level === "58") {
                rincianDiv.innerHTML = `
                    <div class="p-3 bg-red-900/30 border border-red-500/50 rounded-lg text-center">
                        <p class="text-red-400 font-semibold mb-1"><i class="fas fa-exclamation-circle mr-1"></i> Perhatian</p>
                        <p class="text-slate-300 text-xs">Sesuai aturan dokumen Poin 8(d), Level 5 - 8 <b>Tidak Ada Kenaikan Upah</b>.</p>
                    </div>
                `;
                showResult();
                return; // Stop perhitungan
            }

            // Validasi Input Gaji
            if (gajiSekarang === 0) {
                alert("Mohon isi Gaji Saat Ini terlebih dahulu.");
                return;
            }

            // Variabel Penampung
            let totalSenioritas = 0;
            let pengali = 0;
            let gajiDasarBaru = gajiSekarang; // Defaultnya adalah gaji saat ini
            let infoSenioritas = "";
            let infoPenyesuaian = "";

            // --- LOGIKA LEVEL 1 & 2 ---
            if (level === "12") {
                if (gajiSekarang < UMP) {
                    // Kasus: Gaji di bawah UMP
                    // Hitung Pengali Senioritas
                    if(masaKerja >= 1 && masaKerja <= 5) pengali = 9000;
                    else if(masaKerja > 5 && masaKerja <= 10) pengali = 9500;
                    else if(masaKerja > 10 && masaKerja <= 15) pengali = 10000;
                    else if(masaKerja > 15 && masaKerja <= 20) pengali = 10500;
                    else if(masaKerja > 20 && masaKerja <= 25) pengali = 11000;
                    else if(masaKerja > 25 && masaKerja <= 30) pengali = 11500;
                    else if(masaKerja > 30) pengali = 12000;

                    totalSenioritas = masaKerja * pengali;
                    gajiDasarBaru = UMP + totalSenioritas; // Penyesuaian batas bawah
                    
                    infoPenyesuaian = `
                        <div class="flex justify-between items-center border-b border-slate-700/50 pb-2">
                            <span class="flex items-center"><i class="fas fa-arrow-up w-5 text-emerald-500 text-xs"></i> Penyesuaian UMP</span>
                            <span class="font-medium text-slate-200">${formatRupiah(UMP)}</span>
                        </div>
                    `;
                    infoSenioritas = `
                        <div class="flex justify-between items-center border-b border-slate-700/50 pb-2">
                            <span class="flex items-center"><i class="fas fa-layer-group w-5 text-amber-500/80 text-xs"></i> Senioritas</span>
                            <div class="text-right">
                                <span class="font-medium text-amber-400 block">+ ${formatRupiah(totalSenioritas)}</span>
                                <span class="text-[10px] text-slate-500 block mt-0.5">${masaKerja} thn × ${formatRupiah(pengali)}</span>
                            </div>
                        </div>
                    `;
                } else {
                    // Kasus: Gaji di atas/sama dengan UMP
                    infoPenyesuaian = `
                        <div class="flex justify-between items-center border-b border-slate-700/50 pb-2">
                            <span class="flex items-center"><i class="fas fa-check w-5 text-emerald-500 text-xs"></i> Status Upah</span>
                            <span class="text-[11px] text-emerald-400 bg-emerald-900/40 px-2 py-0.5 rounded border border-emerald-700/50">Di Atas UMP (Tanpa Senioritas)</span>
                        </div>
                    `;
                }
            } 
            // --- LOGIKA LEVEL 3 & 4 ---
            else {
                // Dokumen tidak menyebutkan penyesuaian UMP+Senioritas untuk Lv 3-4, 
                // hanya kenaikan PA berdasarkan rentang minimum (kita asumsikan dari gaji saat ini).
                infoPenyesuaian = `
                    <div class="flex justify-between items-center border-b border-slate-700/50 pb-2">
                        <span class="flex items-center"><i class="fas fa-check w-5 text-emerald-500 text-xs"></i> Status Upah</span>
                        <span class="text-[11px] text-slate-400 bg-slate-800 px-2 py-0.5 rounded border border-slate-700">Disesuaikan berdasarkan Gaji Saat Ini</span>
                    </div>
                `;
            }

            // --- HITUNG PERSEN PA ---
            let persen = 0;
            if(level === "12" || level === "3") {
                if(pa === "A") persen = 0.0098;
                else if(pa === "BC") persen = 0.0083;
                else if(pa === "D") persen = 0.0069;
            } else if(level === "4") {
                if(pa === "A") persen = 0.0069;
                else if(pa === "BC") persen = 0.0054;
                else if(pa === "D") persen = 0.0039;
            }

            // --- FINAL CALCULATION ---
            let kenaikanPA = gajiDasarBaru * persen;
            let totalGajiAkhir = gajiDasarBaru + kenaikanPA;

            // --- BUILD UI ---
            let htmlResult = `
                <div class="flex justify-between items-center border-b border-slate-700/50 pb-2">
                    <span class="flex items-center"><i class="fas fa-wallet w-5 text-slate-500 text-xs"></i> Gaji Saat Ini</span>
                    <span class="font-medium text-slate-400 line-through decoration-slate-500">${formatRupiah(gajiSekarang)}</span>
                </div>
                ${infoPenyesuaian}
                ${infoSenioritas}
                <div class="flex justify-between items-center border-b border-slate-700/50 pb-2 bg-slate-800/40 p-2 -mx-2 px-2 rounded-lg">
                    <span class="font-medium text-slate-300">Gaji Dasar Baru</span>
                    <span class="font-semibold text-slate-100">${formatRupiah(gajiDasarBaru)}</span>
                </div>
                <div class="flex justify-between items-center border-b border-slate-700/50 pb-2">
                    <span class="flex items-center"><i class="fas fa-arrow-trend-up w-5 text-cyan-400 text-xs"></i> Performa (PA)</span>
                    <div class="text-right">
                        <span class="font-medium text-cyan-400 block">+ ${formatRupiah(kenaikanPA)}</span>
                        <span class="text-[10px] text-slate-500 block mt-0.5">${(persen * 100).toFixed(2)}% dari Gaji Dasar Baru</span>
                    </div>
                </div>
                <div class="flex justify-between items-center pt-3 mt-2">
                    <span class="font-bold text-slate-200 text-base">Total Gaji Akhir</span>
                    <span class="font-bold text-2xl tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-300 drop-shadow-md">${formatRupiah(totalGajiAkhir)}</span>
                </div>
            `;

            rincianDiv.innerHTML = htmlResult;
            showResult();
        }

        function showResult() {
            const resultBox = document.getElementById('resultBox');
            resultBox.classList.remove('hidden', 'animate-slide-up');
            void resultBox.offsetWidth; // trigger reflow
            resultBox.classList.add('animate-slide-up');
        }
    </script>
</body>
</html>
