<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Penyesuaian Upah 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-4 md:p-8">

    <div class="max-w-xl mx-auto bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700">
        <h2 class="text-2xl font-bold text-emerald-400 mb-6 border-b border-slate-700 pb-4 text-center">
            <i class="fas fa-file-invoice-dollar mr-2"></i>Simulasi Upah 2026
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 bg-slate-900/50 p-4 rounded-xl border border-slate-700">
            <label class="flex items-center space-x-3 cursor-pointer text-sm">
                <input type="checkbox" id="isFraud" class="w-4 h-4 rounded bg-slate-800 border-slate-600 text-emerald-500">
                <span>Terlibat Fraud (2025/2026)</span>
            </label>
            <label class="flex items-center space-x-3 cursor-pointer text-sm">
                <input type="checkbox" id="isHO" class="w-4 h-4 rounded bg-slate-800 border-slate-600 text-emerald-500">
                <span>Karyawan Kantor Pusat (HO)</span>
            </label>
            <label class="flex items-center space-x-3 cursor-pointer text-sm">
                <input type="checkbox" id="isJoinedBefore2025" checked class="w-4 h-4 rounded bg-slate-800 border-slate-600 text-emerald-500">
                <span>Join sebelum 1 Jan 2025</span>
            </label>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <div>
                <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Level Jabatan</label>
                <select id="level" class="w-full p-3 bg-slate-700 rounded-lg border border-slate-600 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                    <option value="1">Level 1</option>
                    <option value="2">Level 2</option>
                    <option value="3">Level 3</option>
                    <option value="4">Level 4</option>
                    <option value="58">Level 5 - 8</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Gaji Sekarang (Rp)</label>
                    <input type="number" id="gajiSekarang" placeholder="5729876" class="w-full p-3 bg-slate-700 rounded-lg border border-slate-600 text-white">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Masa Kerja (Thn)</label>
                    <input type="number" id="masaKerja" value="1" class="w-full p-3 bg-slate-700 rounded-lg border border-slate-600 text-white">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Penilaian Kinerja (PA)</label>
                <select id="pa" class="w-full p-3 bg-slate-700 rounded-lg border border-slate-600 text-white">
                    <option value="A">Nilai A</option>
                    <option value="BC">Nilai B/C</option>
                    <option value="D">Nilai D</option>
                </select>
            </div>
            <button onclick="hitung()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold p-4 rounded-xl mt-2 transition-all">
                Hitung Simulasi
            </button>
        </div>

        <div id="result" class="mt-8 p-6 bg-emerald-900/20 border border-emerald-500/30 rounded-2xl hidden animate-fade-in">
            <h3 class="text-lg font-bold text-emerald-400 mb-4 border-b border-emerald-500/20 pb-2">Hasil Simulasi</h3>
            <div id="rincian" class="space-y-3 text-sm"></div>
        </div>
    </div>

    <script>
        const UMP_JAKARTA = 5729876;
        
        function formatRupiah(num) {
            return "Rp " + Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function hitung() {
            const isFraud = document.getElementById('isFraud').checked;
            const isHO = document.getElementById('isHO').checked;
            const isJoinedBefore2025 = document.getElementById('isJoinedBefore2025').checked;
            const level = document.getElementById('level').value;
            const gajiLama = parseFloat(document.getElementById('gajiSekarang').value) || 0;
            const masaKerja = parseInt(document.getElementById('masaKerja').value) || 0;
            const pa = document.getElementById('pa').value;

            const resDiv = document.getElementById('result');
            const rinDiv = document.getElementById('rincian');
            resDiv.classList.remove('hidden');

            if(isFraud || !isJoinedBefore2025) {
                rinDiv.innerHTML = `<p class="text-red-400 font-bold">Maaf, Anda tidak memenuhi syarat kenaikan (Fraud atau bergabung setelah 1 Jan 2025).</p>`;
                return;
            }

            if(level === '58') {
                rinDiv.innerHTML = `<p class="text-amber-400">Level 5-8: Tidak ada kenaikan.</p>`;
                return;
            }

            let gajiBaru = gajiLama;
            let info = "";

            if(level === '1' || level === '2') {
                let senioritas = 0;
                if(masaKerja >= 1 && masaKerja <= 5) senioritas = 9000 * masaKerja;
                else if(masaKerja > 5 && masaKerja <= 10) senioritas = 9500 * masaKerja;
                else if(masaKerja > 10 && masaKerja <= 15) senioritas = 10000 * masaKerja;
                else if(masaKerja > 15 && masaKerja <= 20) senioritas = 10500 * masaKerja;
                else if(masaKerja > 20 && masaKerja <= 25) senioritas = 11000 * masaKerja;
                else if(masaKerja > 25 && masaKerja <= 30) senioritas = 11500 * masaKerja;
                else if(masaKerja > 30) senioritas = 12000 * masaKerja;

                if(gajiLama < UMP_JAKARTA) {
                    gajiBaru = UMP_JAKARTA + senioritas;
                    info = "Penyesuaian ke UMP + Senioritas";
                } else {
                    let pct = (pa === 'A') ? 0.0098 : (pa === 'BC' ? 0.0083 : 0.0069);
                    gajiBaru = gajiLama + (gajiLama * pct);
                    info = "Kenaikan PA (di atas UMP)";
                }
            } else if(level === '3' || level === '4') {
                if(isHO) {
                    rinDiv.innerHTML = `<p class="text-red-400">Karyawan HO (Level 3-4) tidak mendapatkan kenaikan.</p>`;
                    return;
                }
                let pct = (level === '3') ? (pa === 'A' ? 0.0098 : (pa === 'BC' ? 0.0083 : 0.0069)) 
                                          : (pa === 'A' ? 0.0069 : (pa === 'BC' ? 0.0054 : 0.0039));
                gajiBaru = gajiLama + (gajiLama * pct);
                info = "Kenaikan PA";
            }

            let transport = (!isFraud) ? 10000 : 0;
            let totalGajiBaru = gajiBaru + transport;
            let selisih = totalGajiBaru - gajiLama;
            let totalRapel = selisih * 7; 

            rinDiv.innerHTML = `
                <div class="flex justify-between"><span>Status:</span><span class="font-bold">${info}</span></div>
                <div class="flex justify-between"><span>Gaji Baru:</span><span class="font-bold">${formatRupiah(totalGajiBaru)}</span></div>
                <div class="flex justify-between text-emerald-400"><span>Adjustment Transport:</span><span>+${formatRupiah(transport)}</span></div>
                <div class="border-t border-emerald-500/20 pt-2 mt-2">
                    <p class="text-xs text-slate-400 italic">Estimasi Rapel (Jan-Jun + THR):</p>
                    <p class="text-xl font-bold text-emerald-300">${formatRupiah(totalRapel)}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
