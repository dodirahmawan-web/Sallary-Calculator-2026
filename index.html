<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Penyesuaian Gaji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans selection:bg-blue-200">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 sm:p-8 border border-slate-100">
        <h2 class="text-2xl font-bold text-center text-slate-800 mb-6 pb-4 border-b border-slate-200">
            <i class="fas fa-calculator text-blue-600 mr-2"></i>Simulasi Gaji 2026
        </h2>
        
        <div class="space-y-5">
            <!-- Masa Kerja -->
            <div>
                <label for="masaKerja" class="block text-sm font-semibold text-slate-700 mb-1.5">Masa Kerja (Tahun):</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-briefcase text-slate-400"></i>
                    </div>
                    <input type="number" id="masaKerja" value="10" min="1" max="50" 
                           class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-slate-700 font-medium">
                </div>
            </div>

            <!-- Level Jabatan -->
            <div>
                <label for="level" class="block text-sm font-semibold text-slate-700 mb-1.5">Level Jabatan:</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-layer-group text-slate-400"></i>
                    </div>
                    <select id="level" class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all appearance-none bg-white text-slate-700 font-medium">
                        <option value="123">Level 1 - 3</option>
                        <option value="4">Level 4</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none">
                        <i class="fas fa-chevron-down text-slate-400 text-sm"></i>
                    </div>
                </div>
            </div>

            <!-- Nilai Kinerja (PA) -->
            <div>
                <label for="pa" class="block text-sm font-semibold text-slate-700 mb-1.5">Nilai Kinerja (PA):</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-star text-slate-400"></i>
                    </div>
                    <select id="pa" class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all appearance-none bg-white text-slate-700 font-medium">
                        <option value="A">Nilai A (Sangat Baik)</option>
                        <option value="BC" selected>Nilai B / C (Baik / Cukup)</option>
                        <option value="D">Nilai D (Kurang)</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none">
                        <i class="fas fa-chevron-down text-slate-400 text-sm"></i>
                    </div>
                </div>
            </div>

            <!-- Button -->
            <button onclick="hitungGaji()" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 transition-all duration-200 ease-in-out transform hover:-translate-y-0.5 mt-4">
                Hitung Sekarang
            </button>
        </div>

        <!-- Result Box -->
        <div id="resultBox" class="hidden mt-8 bg-blue-50/50 border border-blue-100 rounded-2xl p-5 shadow-inner">
            <h3 class="text-sm font-bold text-blue-800 uppercase tracking-wider mb-4 text-center">Rincian Perhitungan</h3>
            
            <div class="space-y-3.5 text-sm text-slate-600">
                <div class="flex justify-between items-center border-b border-blue-100/50 pb-3">
                    <span class="flex items-center"><i class="fas fa-money-bill-wave w-5 text-blue-400"></i> UMP Dasar:</span>
                    <span id="outUmp" class="font-semibold text-slate-800">Rp 0</span>
                </div>
                
                <div class="flex justify-between items-center border-b border-blue-100/50 pb-3">
                    <span class="flex items-center"><i class="fas fa-medal w-5 text-amber-500"></i> Tunjangan Senioritas:</span>
                    <div class="text-right">
                        <span id="outSenioritas" class="font-semibold text-slate-800 block">Rp 0</span>
                        <span id="detailSenioritas" class="text-[11px] text-slate-500 block mt-0.5"></span>
                    </div>
                </div>
                
                <div class="flex justify-between items-center border-b border-blue-100/50 pb-3 bg-white/60 p-2 rounded-lg">
                    <span class="font-semibold text-slate-700">Gaji Dasar Baru:</span>
                    <span id="outGajiDasar" class="font-bold text-slate-800">Rp 0</span>
                </div>
                
                <div class="flex justify-between items-center border-b border-blue-100/50 pb-3">
                    <span class="flex items-center"><i class="fas fa-chart-line w-5 text-green-500"></i> Kenaikan Kinerja:</span>
                    <div class="text-right">
                        <span id="outKenaikan" class="font-semibold text-slate-800 block">Rp 0</span>
                        <span id="detailKenaikan" class="text-[11px] text-slate-500 block mt-0.5"></span>
                    </div>
                </div>
                
                <div class="flex justify-between items-center pt-3 mt-1 bg-blue-600 text-white p-3 rounded-xl shadow-md">
                    <span class="font-bold text-base">Total Gaji Akhir:</span>
                    <span id="outTotal" class="font-bold text-xl tracking-tight">Rp 0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Nilai default UMP Jakarta 2026
        const UMP = 5729876;

        function formatRupiah(angka) {
            return "Rp " + Math.round(angka).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function hitungGaji() {
            let masaKerjaInput = document.getElementById('masaKerja');
            let masaKerja = parseInt(masaKerjaInput.value);
            let level = document.getElementById('level').value;
            let pa = document.getElementById('pa').value;

            // Validasi input
            if(isNaN(masaKerja) || masaKerja < 1) {
                masaKerja = 1;
                masaKerjaInput.value = 1;
            }

            // 1. Tentukan Pengali Senioritas
            let pengali = 0;
            if(masaKerja >= 1 && masaKerja <= 5) pengali = 9000;
            else if(masaKerja > 5 && masaKerja <= 10) pengali = 9500;
            else if(masaKerja > 10 && masaKerja <= 15) pengali = 10000;
            else if(masaKerja > 15 && masaKerja <= 20) pengali = 10500;
            else if(masaKerja > 20 && masaKerja <= 25) pengali = 11000;
            else if(masaKerja > 25 && masaKerja <= 30) pengali = 11500;
            else if(masaKerja > 30) pengali = 12000;

            let totalSenioritas = masaKerja * pengali;

            // 2. Gaji Dasar Baru
            let gajiDasarBaru = UMP + totalSenioritas;

            // 3. Persentase PA
            let persen = 0;
            if(level === "123") {
                if(pa === "A") persen = 0.0098;
                else if(pa === "BC") persen = 0.0083;
                else if(pa === "D") persen = 0.0069;
            } else if(level === "4") {
                if(pa === "A") persen = 0.0069;
                else if(pa === "BC") persen = 0.0054;
                else if(pa === "D") persen = 0.0039;
            }

            let kenaikanPA = gajiDasarBaru * persen;
            
            // 4. Total Gaji
            let totalGaji = gajiDasarBaru + kenaikanPA;

            // Update UI dengan hasil perhitungan
            document.getElementById('outUmp').innerText = formatRupiah(UMP);
            
            document.getElementById('outSenioritas').innerText = "+ " + formatRupiah(totalSenioritas);
            document.getElementById('detailSenioritas').innerText = "(" + masaKerja + " tahun × " + formatRupiah(pengali) + ")";
            
            document.getElementById('outGajiDasar').innerText = formatRupiah(gajiDasarBaru);
            
            document.getElementById('outKenaikan').innerText = "+ " + formatRupiah(kenaikanPA);
            document.getElementById('detailKenaikan').innerText = "(" + (persen * 100).toFixed(2) + "% dari Gaji Dasar)";
            
            document.getElementById('outTotal').innerText = formatRupiah(totalGaji);
            
            // Animasi memunculkan result box
            const resultBox = document.getElementById('resultBox');
            
            // Reset animasi
            resultBox.classList.remove('hidden', 'animate-fade-in');
            void resultBox.offsetWidth; // trigger reflow
            resultBox.classList.add('animate-fade-in');
        }
    </script>
</body>
</html>
